# nginx-mobile.conf
# Nginx server block for mobile.decifertrading.com
#
# Purpose:
#   Exposes ONLY the six mobile routes on the mobile subdomain.
#   All other routes (dashboard, admin, state, scan, kill, settings, restart)
#   return 404 — they are structurally unreachable from this subdomain.
#
# Deployment model:
#   - Decifer process runs on 127.0.0.1:8080 (HTTPServer in bot.py)
#   - Nginx listens on 127.0.0.1:8081 (mobile filter, local only)
#   - Cloudflare Tunnel routes mobile.decifertrading.com → localhost:8081
#   - Cloudflare Access sits in front of the tunnel (identity gate)
#   - dashboard.decifertrading.com → localhost:8080 (direct, unchanged)
#
# Installation:
#   sudo cp deployment/nginx-mobile.conf /etc/nginx/sites-available/mobile-decifer
#   sudo ln -s /etc/nginx/sites-available/mobile-decifer /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# TLS: Cloudflare handles TLS termination at the edge.
#      Use a Cloudflare Origin Certificate for the origin connection.

# Per-IP rate limit zone for /api/mobile/ask (1 r/10s per IP = 6/min)
# Defined at http-block level — paste into /etc/nginx/nginx.conf http{} block
# or into a conf.d/ include before this server block is loaded:
#
#   limit_req_zone $binary_remote_addr zone=mobile_ask:1m rate=6r/m;

server {
    listen 127.0.0.1:8081;
    server_name _;   # matches any Host — Cloudflare Tunnel sets the correct Host header

    # ── Route: mobile shell ────────────────────────────────────────────────────
    location = / {
        return 302 /mobile;
    }

    location = /mobile {
        proxy_pass         http://127.0.0.1:8080/mobile;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Preserve CF-Connecting-IP so bot_dashboard._is_remote_request() fires
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 10s;
    }

    # ── Routes: read-only mobile API ──────────────────────────────────────────
    # /api/mobile/now, /api/mobile/why, /api/mobile/alpha, /api/mobile/portfolio
    # /api/mobile/ask (POST, LLM read-only, rate-limited in app + Nginx)
    location ^~ /api/mobile/ {
        proxy_pass         http://127.0.0.1:8080;   # URI is preserved, e.g. /api/mobile/now
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 30s;

        # Nginx-level rate limit for Ask endpoint (burst allows occasional fast retries)
        # Requires limit_req_zone defined above.
        # Uncomment once limit_req_zone is added to nginx.conf:
        # limit_req zone=mobile_ask burst=3 nodelay;
    }

    # ── Block everything else ──────────────────────────────────────────────────
    # Dashboard routes, admin routes, state, scan, kill, settings, restart, etc.
    location / {
        return 404;
    }
}
