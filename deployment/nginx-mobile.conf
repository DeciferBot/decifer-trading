# nginx config for mobile.decifertrading.com
# Routes all traffic to the decifer-mobile Next.js container on port 3000.
# Cloudflare handles TLS; tunnel routes mobile.decifertrading.com → 127.0.0.1:8081.

server {
    listen 127.0.0.1:8081;
    server_name _;

    # Root → /customer (Next.js app redirects this too, but be explicit)
    location = / {
        return 302 /customer;
    }

    # Next.js static assets
    location ^~ /_next/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 1y;
        add_header Cache-Control public;
    }

    # All app pages and API routes
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
