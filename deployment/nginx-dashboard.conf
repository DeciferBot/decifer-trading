# deployment/nginx-dashboard.conf
#
# Nginx config for dashboard.decifertrading.com
# Proxies to the Decifer bot dashboard (bot_dashboard.py) on port 8080.
#
# Security: this MUST be gated by a Cloudflare Access policy before the bot
# moves to the droplet. The dashboard has no auth of its own.
#
# SSL: self-signed cert, Cloudflare Full SSL mode (same pattern as intelligence API).
#
# Installation (already applied — kept here for reference/rebuild):
#   openssl req -x509 -nodes -days 1095 -newkey rsa:2048 \
#     -keyout /etc/ssl/decifer/dashboard-selfsigned.key \
#     -out /etc/ssl/decifer/dashboard-selfsigned.crt \
#     -subj "/CN=dashboard.decifertrading.com/O=Decifer/C=GB" \
#     -addext "subjectAltName=DNS:dashboard.decifertrading.com"
#   sudo cp deployment/nginx-dashboard.conf \
#            /etc/nginx/sites-available/decifer-dashboard
#   sudo ln -sf /etc/nginx/sites-available/decifer-dashboard \
#               /etc/nginx/sites-enabled/decifer-dashboard
#   sudo nginx -t && sudo systemctl reload nginx
#
# Status: nginx config live, returns 502 until bot is running on this host.

server {
    listen 80;
    server_name dashboard.decifertrading.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.decifertrading.com;

    ssl_certificate     /etc/ssl/decifer/dashboard-selfsigned.crt;
    ssl_certificate_key /etc/ssl/decifer/dashboard-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Bot dashboard — password protected
    auth_basic           "Decifer Dashboard";
    auth_basic_user_file /etc/nginx/conf.d/.dashboard_htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
