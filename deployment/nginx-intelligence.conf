# deployment/nginx-intelligence.conf
#
# Nginx reverse proxy for the Decifer Intelligence Cloud — DigitalOcean droplet.
#
# Runtime layer:    deployment/config
# Imported at runtime: No
# Affects execution:   No
# Intelligence cloud:  Yes — DO droplet only
# Cloud cost/impact:   Negligible
#
# Architecture (M9):
#   Visitors → Cloudflare edge (TLS, DDoS, Access gate)
#     └─→ DigitalOcean origin port 443 (self-signed cert, CF "Full" SSL mode)
#           └─→ Nginx (this file)
#                 └─→ decifer-intelligence container on 127.0.0.1:8001
#
# SSL mode: Cloudflare "Full" (not Strict). Self-signed cert on origin is accepted.
# Upgrade path: replace self-signed cert with a Cloudflare Origin Certificate and
# set zone SSL to "Full (Strict)" — see M9 report §TLS upgrade path.
#
# Route policy (intelligence cloud — NOT the Mac bot):
#   GET  /health              → container:8001  (monitoring)
#   GET  /api/*               → container:8001  (intelligence API)
#   POST/PUT/PATCH/DELETE any → 403             (nginx limit_except blocks at proxy)
#   Any other path            → 404
#
# Installation (DigitalOcean droplet — run m9_install_tls.sh):
#   1. sudo bash scripts/cloud/m9_install_tls.sh
#   OR manually:
#   sudo cp deployment/nginx-intelligence.conf \
#            /etc/nginx/sites-available/decifer-intelligence
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert paths (created by m9_install_tls.sh):
#   /etc/ssl/decifer/intelligence-selfsigned.crt
#   /etc/ssl/decifer/intelligence-selfsigned.key

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name intelligence.decifertrading.com;

    # Redirect all HTTP to HTTPS permanently.
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Intelligence API (M9)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name intelligence.decifertrading.com;

    ssl_certificate     /etc/ssl/decifer/intelligence-selfsigned.crt;
    ssl_certificate_key /etc/ssl/decifer/intelligence-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Health check ─────────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── Intelligence API — GET only ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        limit_except GET {
            deny all;
        }
    }

    # ── Root view and /view alias — structural analysis HTML page ────────────
    location = / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;

        limit_except GET {
            deny all;
        }
    }

    location = /view {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;

        limit_except GET {
            deny all;
        }
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }
}
