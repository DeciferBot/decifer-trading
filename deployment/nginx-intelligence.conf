# deployment/nginx-intelligence.conf
#
# Nginx reverse proxy for the Decifer Intelligence API on DigitalOcean.
#
# Runtime layer:    deployment/config
# Imported at runtime: No
# Affects execution:   No
# Intelligence cloud:  Yes — this file is for the DO intelligence node only
# Cloud cost/impact:   Negligible (Nginx config, no network calls)
#
# Architecture:
#   Cloudflare (TLS termination + Access + rate limiting)
#     └─→ DigitalOcean origin (port 80 — Cloudflare Tunnel or Origin Certificate)
#           └─→ Nginx (this file) on 127.0.0.1:8090
#                 └─→ gunicorn on 127.0.0.1:8000 (intelligence_api.py)
#
# Route policy (intelligence cloud — NOT the Mac bot):
#   GET  /health              → gunicorn:8000   (operator/monitoring only)
#   GET  /api/*               → gunicorn:8000   (all intelligence API routes)
#   POST/PUT/PATCH/DELETE any → 405             (no mutation routes exist)
#   Any other path            → 404             (structurally blocked)
#
# This is NOT nginx-mobile.conf (which is the Mac nginx filter for
# mobile.decifertrading.com → bot_dashboard.py on port 8080).
# These are two entirely separate nginx configs on two separate machines.
#
# Installation (DigitalOcean droplet):
#   sudo cp deployment/nginx-intelligence.conf \
#            /etc/nginx/sites-available/decifer-intelligence
#   sudo ln -s /etc/nginx/sites-available/decifer-intelligence \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t          # must print "syntax is ok"
#   sudo systemctl reload nginx
#
# Verify the filter works locally before Cloudflare wiring:
#   curl -s http://127.0.0.1:8090/health | python3 -m json.tool
#   curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8090/api/market-now
#   curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8090/some-other-path
#   # Expect: 200 / 200 / 404
#
# Cloudflare Tunnel wiring (append to ~/.cloudflared/config.yml on droplet):
#
#   ingress:
#     - hostname: intelligence.decifertrading.com
#       service: http://localhost:8090
#
# Or point Cloudflare Tunnel directly to gunicorn on port 8000 and skip Nginx:
#   ingress:
#     - hostname: intelligence.decifertrading.com
#       service: http://localhost:8000
# (Use the Nginx path if you want the route-level 404 guard below.)

# ─────────────────────────────────────────────────────────────────────────────
# Intelligence API — local-only listener on 8090
# Cloudflare Tunnel (or load balancer) hits this. Never exposed on 0.0.0.0.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 127.0.0.1:8090;
    server_name _;   # Cloudflare Tunnel sets correct Host header

    # ── Health check — operator/monitoring only ────────────────────────────────
    # Confirms: status=ok, runtime_mode=intelligence_cloud, execution_blocked=true
    location = /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Intelligence API routes — GET only ────────────────────────────────────
    # Covers: /api/market-now  /api/mobile/now  /api/mobile/why
    #         /api/mobile/alpha  /api/mobile/portfolio
    # All are GET-only at the app level (intelligence_api.py registers no POST routes).
    # Nginx enforces this a second time at the proxy layer.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;

        # Block all mutation methods at Nginx level (defence in depth).
        # intelligence_api.py already registers only GET routes;
        # this ensures no POST/PUT/PATCH/DELETE ever reaches gunicorn.
        limit_except GET {
            deny all;
        }
    }

    # ── Block everything else ─────────────────────────────────────────────────
    # No dashboard routes, no admin routes, no bot state, no order state.
    # intelligence.decifertrading.com exposes ONLY /health and /api/*.
    location / {
        return 404;
    }
}
