# docker-compose.yml — Decifer Trading Phase 1 Cloud Stack
#
# Purpose: packages the three Decifer services for future cloud deployment.
#          This file is NOT currently used in production. It exists for
#          validation, readiness preparation, and future cloud deployment only.
#
# Services:
#   handoff-publisher   — Intelligence handoff publisher (no IBKR required)
#   handoff-observer    — Monitoring observer for handoff publisher (no IBKR required)
#   live-bot            — Live trading bot (requires IBKR Gateway)
#
# Startup order:  handoff-publisher → handoff-observer → live-bot
# Shutdown order: live-bot → handoff-observer → handoff-publisher
#
# Usage:
#   docker compose config          # validate this file
#   docker compose build           # build image
#   docker compose up -d handoff-publisher handoff-observer   # start without bot
#   docker compose up -d live-bot  # start bot (requires IBKR Gateway running)
#   docker compose ps              # check status
#   docker compose logs -f         # tail all logs
#
# IBKR Gateway note:
#   live-bot uses network_mode: host on Linux so the container can reach
#   the IBKR Gateway on the host at 127.0.0.1:4002. On macOS Docker Desktop,
#   set IBKR_HOST=host.docker.internal in .env instead (requires config.py to
#   read IBKR_HOST env var — already implemented).
#
# Never change the live-bot CMD to bot.py without explicit Amit approval.
# Never set HANDOFF_PUBLISHER_MODE=controlled_activation without Amit approval.

services:

  # ── Handoff Publisher ──────────────────────────────────────────────────────
  # Scheduled intelligence worker. Runs one publish cycle then exits.
  # Restarted by the compose restart policy on-failure.
  # No IBKR dependency — safe to run 24/7.
  #
  # In production, pair with a cron job or systemd timer for reliable scheduling:
  #   */15 * * * * docker compose -f /opt/decifer/docker-compose.yml restart handoff-publisher
  handoff-publisher:
    build: .
    image: decifer-trading:latest
    command: python3 handoff_publisher.py
    restart: "on-failure:3"
    volumes:
      - decifer-data:/app/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.0"
    healthcheck:
      # Pass if heartbeat file was written within the last 20 minutes (1200s).
      # Fails if publisher has not completed a cycle recently.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import json, time, sys
          try:
            h = json.load(open('data/heartbeats/handoff_publisher.json'))
            age = time.time() - h.get('last_success_ts', 0)
            sys.exit(0 if age < 1200 else 1)
          except Exception:
            sys.exit(1)
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 60s

  # ── Handoff Observer ───────────────────────────────────────────────────────
  # Monitoring-only service. Read-only. Does not affect the live bot.
  # No IBKR dependency.
  handoff-observer:
    build: .
    image: decifer-trading:latest
    command: python3 handoff_publisher_observer.py
    restart: "on-failure:3"
    depends_on:
      - handoff-publisher
    volumes:
      - decifer-data:/app/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Live Trading Bot ───────────────────────────────────────────────────────
  # Always-on during market hours. Requires IBKR Gateway accessible on the host.
  #
  # ⚠️  COMPOSE PROFILE: "live"
  #   This service is gated behind the "live" Compose profile.
  #   It will NOT start with `docker compose up` (default).
  #   It will NOT start with the decifer-docker-stack.service systemd unit.
  #
  #   To start live-bot (Amit approval required, never during market hours):
  #     docker compose --profile live up -d live-bot
  #
  # network_mode: host — required on Linux so the container reaches IBKR Gateway
  # at 127.0.0.1:4002 (IB Gateway paper) on the host. Ports declared below are
  # informational only (host networking ignores the ports: directive).
  #
  # macOS Docker Desktop: remove network_mode: host and set IBKR_HOST=host.docker.internal
  # in .env. config.py reads IBKR_HOST env var.
  #
  # NEVER change command to python3 bot.py without Amit's explicit approval.
  # NEVER set HANDOFF_PUBLISHER_MODE=controlled_activation without Amit's approval.
  live-bot:
    profiles: [live]   # Safety gate: requires --profile live to start
    build: .
    image: decifer-trading:latest
    command: python3 bot.py
    restart: unless-stopped
    network_mode: host    # Linux only — required for IBKR localhost connection
    depends_on:
      - handoff-publisher
    volumes:
      - decifer-data:/app/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.5"
    # Informational port list (host networking — ports: is ignored at runtime)
    # ports:
    #   - "8080:8080"   # bot dashboard

  # ── Intelligence API ────────────────────────────────────────────────────────
  # Customer-safe intelligence REST API.
  # Runs on DigitalOcean — NEVER on the Mac execution node.
  #
  # DECIFER_RUNTIME_MODE=intelligence_cloud ensures execution is unconditionally
  # blocked inside the container regardless of any other env var.
  #
  # Serves:
  #   GET /health                 — liveness check
  #   GET /api/market-now         — SaaS-safe Market Now payload
  #   GET /api/mobile/now         — operational snapshot (no broker state)
  #   GET /api/mobile/why         — macro drivers and theme transmission
  #   GET /api/mobile/alpha       — intelligence candidates, last Apex read
  #   GET /api/mobile/portfolio   — intelligence-only placeholder
  #
  # Start (DigitalOcean):
  #   docker compose --profile intelligence up -d intelligence-api
  #
  # Never start this profile on the Mac execution node.
  intelligence-api:
    profiles: [intelligence]   # Safety gate: requires --profile intelligence to start
    # Uses the intelligence-only Dockerfile (requirements.intelligence.txt).
    # No broker libraries (ib_async), no ML training packages.
    # DECIFER_RUNTIME_MODE=intelligence_cloud is hardcoded in the image ENV.
    build:
      context: .
      dockerfile: deployment/Dockerfile.intelligence
    image: decifer-intelligence:latest
    command: >
      gunicorn intelligence_api:app
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 60
      --access-logfile -
      --error-logfile -
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - decifer-data:/app/data:ro   # read-only mount — intelligence cloud never writes execution state
      - ./logs:/app/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - DECIFER_RUNTIME_MODE=intelligence_cloud
      - DECIFER_EXECUTION_ENABLED=false
      - DECIFER_CUSTOMER_OUTPUT_MODE=true
      - DECIFER_MOBILE_READ_ONLY=true
      - DECIFER_DASHBOARD_CONTROL_ENABLED=false
    deploy:
      resources:
        limits:
          memory: 2560m
          cpus: "1.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Options Flow Monitor ──────────────────────────────────────────────────────
  # Real-time OPRA stream processor. Streams option trades for the committed
  # universe (1,000 symbols), detects unusual flow (sweeps, clusters, cross-expiry),
  # and writes data/options_flow/live_events.json + leaderboard.json.
  #
  # The intelligence-api reads these files (read-only volume mount) and serves them
  # via /api/options/feed, /api/options/leaderboard, /api/options/symbol/<ticker>.
  #
  # Start (DigitalOcean, after intelligence-api is running):
  #   docker compose --profile options up -d options-flow-monitor
  #
  # Stop:
  #   docker compose --profile options stop options-flow-monitor
  #
  # Logs:
  #   docker compose --profile options logs -f options-flow-monitor
  #
  # NEVER run this on the Mac execution node — it has no IBKR dependency but
  # runs indefinitely and is intended for the DO cloud server only.
  options-flow-monitor:
    profiles: [options]
    build:
      context: .
      dockerfile: deployment/Dockerfile.intelligence
    image: decifer-intelligence:latest
    command: python3 options_flow_monitor.py
    restart: unless-stopped
    volumes:
      - decifer-data:/app/data   # read-write — monitor writes data/options_flow/
      - ./logs:/app/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - DECIFER_RUNTIME_MODE=intelligence_cloud
      - DECIFER_EXECUTION_ENABLED=false
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import time, sys, os
          from datetime import datetime, timezone
          # Market is closed on weekends — OPRA streams nothing, no file is expected.
          now = datetime.now(timezone.utc)
          if now.weekday() >= 5:
            sys.exit(0)
          p = "data/options_flow/live_events.json"
          if not os.path.exists(p):
            sys.exit(1)
          age = time.time() - os.path.getmtime(p)
          sys.exit(0 if age < 300 else 1)
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 120s

  # ── IBeam — headless IB Gateway (paper account) ─────────────────────────────
  # Runs IB Gateway on Linux without a display. Handles auto-login and the 24h
  # session keepalive. The live-bot reaches it via host networking at 127.0.0.1:4002.
  #
  # Credentials: IBEAM_ACCOUNT and IBEAM_PASSWORD in .env (never committed).
  # Start:  docker compose --profile ibkr up -d ibeam
  # Health: curl http://localhost:5000/v1/api/tickle
  ibeam:
    profiles: [ibkr]
    image: voyz/ibeam:latest
    restart: unless-stopped
    environment:
      - IBEAM_ACCOUNT=${IBEAM_ACCOUNT}
      - IBEAM_PASSWORD=${IBEAM_PASSWORD}
      - IBEAM_GATEWAY_BASE_URL=https://localhost:4002
      - IBEAM_LOG_TO_FILE=True
      - IBEAM_PAPER_ACCOUNT=1
      - IBEAM_GATEWAY_STARTUP=60
    ports:
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5000:5000"
    volumes:
      - ibeam-conf:/srv/ibeam/conf
    shm_size: '1gb'
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.5"

# ── Named volumes ──────────────────────────────────────────────────────────────
# On first deploy, seed data/ via rsync from dev machine before compose up.
# Then: chown -R 1000:1000 /opt/decifer/data /opt/decifer/logs
volumes:
  decifer-data:
    driver: local
  ibeam-conf:
    driver: local
